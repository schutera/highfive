# CI test workflow.
#
# Nine parallel jobs:
#
#   esp-native      → host-side Unity tests for the pure C++ helpers
#                     under ESP32-CAM/lib/. Fast (~1 min cold).
#
#   esp-firmware    → 'pio run -e esp32cam': cross-compiles the actual
#                     firmware against the espressif32 platform. Catches
#                     breakage that only shows up when the .ino + .cpp
#                     sources are linked together for the target.
#
#   backend-unit    → vitest + supertest unit tests for the Node/Express
#                     backend API (mocks db layer).
#
#   duckdb-unit     → pytest unit tests for the DuckDB service (real
#                     in-memory DuckDB, no outbound HTTP).
#
#   image-unit      → pytest unit tests for the image-service (all
#                     outbound HTTP and duckdb.connect are mocked).
#
#   homepage-unit   → vitest + jsdom smoke tests for the React homepage.
#
#   doc-citations   → walks `path:line` references in docs/ and CLAUDE.md
#                     and verifies each one resolves to a non-blank line
#                     of the current source. Fast (<10 s).
#
#   e2e-pipeline    → boots the four-service docker compose, drives it
#                     with the Python mock ESP, asserts the upload chain
#                     works end-to-end. Slower (~5 min cold).
#
#   ui-playwright   → boots the four-service stack plus a production-built
#                     homepage container, seeds UI-specific fixtures, drives
#                     real Chromium through the SPA. Pins the chapter-11
#                     regressions (envelope drift, side-list filter) that
#                     jsdom + mocks could not catch. Slowest (~6 min cold).
#
# Triggers on PRs to main and on push to main (badge stays green there)
# and on push to the chore/test-harness branch so the workflow validates
# itself before being merged.

name: tests

# Adding a new trigger here? Then also:
#   1. Update the matrix in docs/08-crosscutting-concepts/auth.md
#      ("GitHub Actions integration" — 5 rows today, one per current trigger).
#   2. Revisit the esp-firmware "Guard — GEO_API_KEY must be set on main"
#      step's `if:` so manual / scheduled runs against `main` stay
#      protected from accidentally building Null-Island firmware.
# Without those two updates, the doc and the guard drift silently from
# the actual trigger matrix. See chapter 11 lessons-learned
# "Drift sweep is not a substitute for a CI check" for why we do not
# rely on prose warnings alone for this kind of cross-surface
# consistency.
on:
  push:
    branches: [main, 'chore/test-harness']
  pull_request:
    branches: [main]

# Cancel previous runs of this workflow on the same ref when a new push
# arrives — avoids burning Actions minutes on superseded commits.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  esp-native:
    name: ESP32-CAM native unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PlatformIO Core
        run: pip install platformio==6.1.19

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('ESP32-CAM/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Run native unit tests
        working-directory: ESP32-CAM
        run: pio test -e native

  esp-firmware:
    name: ESP32-CAM firmware build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PlatformIO Core
        run: pip install platformio==6.1.19

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-fw-${{ runner.os }}-${{ hashFiles('ESP32-CAM/platformio.ini') }}
          restore-keys: |
            pio-fw-${{ runner.os }}-

      # Hard-fail when building from main with no GEO_API_KEY stored. On
      # main, a missing secret means deployed firmware would skip the
      # Google call at first boot and report (0, 0, 0) — modules plot at
      # Null Island on the dashboard. We want a loud build failure, not
      # a silent broken release. Fork PRs and same-repo branch builds
      # are exempt: forks can't access secrets by design (GitHub
      # security feature), and branch builds may legitimately be tested
      # without the production key. See
      # docs/08-crosscutting-concepts/auth.md "Third-party API keys".
      - name: Guard — GEO_API_KEY must be set on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GEO_API_KEY: ${{ secrets.GEO_API_KEY }}
        run: |
          if [ -z "${GEO_API_KEY}" ]; then
            echo "::error title=GEO_API_KEY missing::No GEO_API_KEY repository secret is configured. A main-branch firmware build without the key produces Null Island modules. Add the secret at https://github.com/${{ github.repository }}/settings/secrets/actions before re-running this workflow."
            exit 1
          fi
          echo "GEO_API_KEY present (len=${#GEO_API_KEY})"

      - name: Build esp32cam firmware
        working-directory: ESP32-CAM
        env:
          # extra_scripts.py reads this via os.environ.get and injects
          # -DGEO_API_KEY="<value>" into the firmware build. The value
          # never reaches build logs — only its length is printed.
          # Empty / missing on fork PRs is intentional; the runtime
          # guard handles it. The push-to-main guard above catches
          # accidental "deleted secret on main" regressions.
          GEO_API_KEY: ${{ secrets.GEO_API_KEY }}
        run: pio run -e esp32cam

  backend-unit:
    name: Backend unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          # Single root lockfile since the npm workspaces refactor —
          # `backend/`, `homepage/`, and `contracts/` all install via the
          # root `package-lock.json`.
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspace backend

  duckdb-unit:
    name: DuckDB service unit tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Matrix the full supported Python range. CI historically ran only 3.11,
    # but the repo specifies its Python runtime inconsistently: the container
    # path builds and runs `python:3.12-slim` (the only Dockerfile), the deploy
    # docs prose still says 3.11, and the bare-metal PM2 host that crashed
    # (#180) ran 3.10 — an ImportError on `datetime.UTC` (added in 3.11) proves
    # that runtime was < 3.11. So we pin the test to no single version:
    # 3.10 is a conservative floor, 3.14 the forward ceiling. The 3.11-only
    # `datetime.UTC` slipped through precisely because CI tested one version
    # (#180; rationale + floated pins in ADR-028). fail-fast: false so one
    # version's failure doesn't mask the others.
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: duckdb-service/requirements-dev.txt

      - name: Install dependencies
        working-directory: duckdb-service
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: duckdb-service
        run: pytest tests/ -q

  image-unit:
    name: Image service unit tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Same 3.10–3.14 matrix as duckdb-unit (the log_ring.py that broke is
    # duplicated in both services). image-service's native deps (numpy,
    # onnxruntime) are floated to `>=` in requirements.txt precisely so this
    # matrix can resolve a per-interpreter wheel — no single pinned version
    # spans cp310…cp314. See ADR-028.
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: image-service/requirements-dev.txt

      - name: Install dependencies
        working-directory: image-service
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: image-service
        run: pytest tests/ -q

  homepage-unit:
    name: Homepage unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          # Single root lockfile since the npm workspaces refactor.
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspace homepage

  doc-citations:
    name: Doc-citation drift gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run check-doc-citations.sh
        # Walks every `path:line` citation in docs/ + CLAUDE.md, reads
        # the cited line in the current source, and fails on missing
        # files / past-EOF citations / basename-ambiguous citations.
        # See docs/11-risks-and-technical-debt/ "Drift sweep is not a
        # substitute for a CI check".
        run: bash scripts/check-doc-citations.sh

  e2e-pipeline:
    name: End-to-end pipeline test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install test dependencies
        run: pip install -r tests/e2e/requirements.txt

      - name: Show Docker version
        run: docker version && docker compose version

      - name: Run e2e pipeline tests
        run: python -m pytest tests/e2e/ -v --tb=short

      - name: Capture compose logs on failure
        if: failure()
        run: |
          docker compose -f tests/e2e/docker-compose.test.yml \
                         -p highfive-e2e logs --no-color || true

  ui-playwright:
    name: UI tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # tests/ui/ is intentionally NOT a root workspace (so the
          # Playwright browser cache stays out of homepage/backend
          # resolution), so it has its own lockfile.
          cache: npm
          cache-dependency-path: tests/ui/package-lock.json

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install UI test deps
        working-directory: tests/ui
        run: npm ci

      - name: Install seed-script deps
        run: pip install -r tests/e2e/requirements.txt

      # The browser binaries Playwright fetches live in
      # ~/.cache/ms-playwright (~150 MB Chromium). Cache key tracks the
      # tests/ui lockfile so a Playwright minor bump invalidates the
      # cache and the runner pays the install cost on the next push.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('tests/ui/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: tests/ui
        run: npx playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: tests/ui
        run: npx playwright install-deps chromium

      - name: Show Docker version
        run: docker version && docker compose version

      - name: Boot UI stack
        run: |
          docker compose -f tests/ui/docker-compose.ui.yml \
                         -p highfive-ui up -d --build
          echo "--- containers ---"
          docker compose -f tests/ui/docker-compose.ui.yml -p highfive-ui ps

      - name: Seed UI-specific fixtures
        run: python tests/ui/scripts/seed_ui_fixtures.py

      - name: Run Playwright specs
        working-directory: tests/ui
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/ui/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Capture compose logs on failure
        if: failure()
        run: |
          for svc in homepage backend image-service duckdb-service; do
            echo "==================== $svc ===================="
            docker compose -f tests/ui/docker-compose.ui.yml \
                           -p highfive-ui logs --no-color "$svc" 2>&1 || true
          done

      # Cat the JSON report inline so the failure cause is in the log
      # even when artifact download is unavailable. test-results/
      # also holds per-failure trace + screenshot + video as siblings.
      - name: Dump Playwright failure summary on failure
        if: failure()
        run: |
          echo "--- tests/ui/test-results/ tree ---"
          find tests/ui/test-results -maxdepth 3 -type f 2>/dev/null | head -50 || true
          echo "--- error-context.md per failure ---"
          find tests/ui/test-results -name 'error-context.md' -exec sh -c 'echo "===== {} ====="; cat "{}"' \; 2>/dev/null || true

      - name: Tear down UI stack
        if: always()
        run: |
          docker compose -f tests/ui/docker-compose.ui.yml \
                         -p highfive-ui down -v || true
