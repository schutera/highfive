; PlatformIO project configuration for the HiveHive ESP32-CAM firmware.
;
; Two coexisting build environments:
;
;   * esp32cam — flashable firmware (Arduino framework on ESP32). Mirrors what
;                Arduino IDE produces. May need board/flash tuning when first
;                wired up to a device; CI use is best-effort until then.
;
;   * native   — host-side unit tests for the pure C++ helper libraries under
;                lib/. No hardware, no Arduino runtime, runs in milliseconds.
;                This is the env Phase 0 invests in.
;
; The source layout is kept flat so that the existing Arduino IDE workflow
; keeps working: open ESP32-CAM.ino, click Upload, done. platformio.ini is
; the source of truth for library versions; Arduino IDE is for flashing only.

[platformio]
src_dir = .
lib_dir = lib
test_dir = test
include_dir = .

[env]
build_flags =
    -std=gnu++17
    -Wall
; src_dir = . is set globally so the Arduino IDE flat layout works. The
; downside is PlatformIO's default src filter would also pick up lib/ and
; test/, causing double compilation and pulling Unity test files into the
; firmware build. Exclude them explicitly:
build_src_filter = +<*> -<lib/> -<test/> -<.pio/>

[env:esp32cam]
platform = espressif32@^6.6.0
board = esp32cam
framework = arduino
monitor_speed = 115200
; Keep DTR/RTS deasserted on monitor connect. Without these, pyserial
; pulls EN low when the monitor opens, which holds the ESP in reset and
; produces an apparently-silent serial line. Diagnosed during the
; manual onboarding test in feat/onboarding-feedback.
monitor_rts = 0
monitor_dtr = 0
upload_speed = 460800
lib_deps =
    bblanchon/ArduinoJson@^6.21.5
build_flags =
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

[env:native]
platform = native
test_framework = unity
build_flags =
    ${env.build_flags}
    -DUNIT_TEST
test_filter = test_native_*
test_build_src = no
