services:
  backend:
    build:
      # Context is repo root since we need contracts/ + root lockfile
      # for npm workspaces. Dockerfile lives under backend/.
      context: .
      dockerfile: backend/Dockerfile.dev
    ports:
      - '3002:3002'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      # PORT is set explicitly even though backend/src/port.ts's
      # resolvePort() now defaults to 3002 — it documents the dev-stack
      # intent and silences the unset-fallback warning that server.ts
      # emits otherwise. Dropping this line is a no-op for the dashboard
      # (default matches the host:container mapping above) but will
      # trigger the warning; treat that as the signal to ask whether
      # the drop was intentional.
      PORT: '3002'
      DUCKDB_SERVICE_URL: http://duckdb-service:8000
      IMAGE_SERVICE_URL: http://image-service:4444
      # On-disk server-log persistence (#178 / ADR-023): JSONL + daily rotation,
      # retained ≤30 files / ≤100 MB, backfilled into the ring on restart.
      LOG_DIR: /var/log/highfive
    volumes:
      # Bind-mount backend source for live reload, plus contracts so
      # type changes flow through. Anonymous volumes shadow the
      # in-image node_modules so the host's (Windows) node_modules
      # don't leak in.
      - ./backend:/app/backend
      - ./contracts:/app/contracts
      - /app/node_modules
      - /app/backend/node_modules
      - backend_logs:/var/log/highfive
    restart: unless-stopped
    networks:
      - net

  homepage:
    build:
      # Same workspace-root context trick as backend above: contracts/ is a
      # sibling workspace and the root lockfile is needed for npm install.
      context: .
      dockerfile: homepage/Dockerfile.dev
    ports:
      - '5173:5173'
    environment:
      NODE_ENV: development
      # Feature flags (ADR-022). On in the dev stack so the dashboard
      # latest-captures gallery (#154) is visible locally; default off in prod.
      VITE_ENABLE_DASHBOARD_IMAGES: 'true'
    volumes:
      - ./homepage:/app/homepage
      - ./contracts:/app/contracts
      - /app/node_modules
      - /app/homepage/node_modules
    restart: unless-stopped
    networks:
      - net

  image-service:
    build:
      context: ./image-service
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    ports:
      - '8000:4444'
    environment:
      DUCKDB_PATH: /data/app.duckdb
      # Server-log persistence (#178 / ADR-023). Distinct subdir of the shared
      # duckdb_data volume so the two Flask services don't collide on one file.
      LOG_DIR: /data/logs/image
    volumes:
      - duckdb_data:/data
    restart: unless-stopped
    depends_on:
      duckdb-service:
        condition: service_healthy
    networks:
      - net

  duckdb-service:
    build:
      context: ./duckdb-service
      dockerfile: Dockerfile.dev
    ports:
      - '0.0.0.0:8002:8000'
    volumes:
      - duckdb_data:/data
    env_file:
      - .env
    environment:
      SEED_DATA: 'true'
      # Server-log persistence (#178 / ADR-023). Distinct subdir of the shared
      # duckdb_data volume so the two Flask services don't collide on one file.
      LOG_DIR: /data/logs/duckdb
      # Dev-only: register /firmware.json + /firmware.app.bin proxy to
      # homepage:5173 so the ESP can fetch OTA artifacts in dev. In
      # prod, host-nginx serves these directly from homepage static.
      HIGHFIVE_DEV_OTA_PROXY: 'true'
      HOMEPAGE_DEV_URL: 'http://homepage:5173'
      # Server-side weather worker (#111, ADR-017). On by default in
      # dev so the measurements store gains real Open-Meteo rows for
      # the seeded modules on the first tick after the stack is up;
      # a homepage chart consuming `temperature_c` / `humidity_pct` /
      # `precipitation_mm` is a follow-up (the existing
      # ActivityWeatherChart still calls Open-Meteo browser-direct
      # per ADR-015). Set to 'false' on a stack where outbound HTTP
      # is intentionally throttled — the admin backfill endpoint
      # stays reachable either way.
      WEATHER_WORKER_ENABLED: 'true'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - net

volumes:
  duckdb_data:
  # Backend server logs (#178 / ADR-023). The Flask services persist under
  # subdirs of duckdb_data; the backend has no data volume, so it gets its own.
  backend_logs:

networks:
  net:
    driver: bridge
