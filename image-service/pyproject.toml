[tool.ruff]
# Match Black’s defaults for line length
line-length = 88
# Pin to the matrix floor (ADR-028), NOT a higher version: this config enables
# the `UP` (pyupgrade) rule below, and on a `py311`+ target `ruff check --fix`
# rewrites `datetime.now(timezone.utc)` → `datetime.now(UTC)` — reintroducing
# the exact 3.11-only API that crashed prod (#180). ruff is NOT run in CI, so
# this only guards a local `ruff --fix` / editor-on-save — but that is exactly
# where the rewrite would silently sneak back in.
target-version = "py310"
exclude = ["venv", ".venv", "build", "dist", ".git"]

# Enable common rule sets
lint.select = [
  "E", "F",   # pycodestyle + pyflakes
  "I",        # isort (imports)
  "B",        # bugbear (sensible warnings)
  "UP"        # pyupgrade (modernize)
]

# Ignore noisy rules (adjust if needed)
lint.ignore = [
  "E203",     # whitespace before ':', Black-compatible
  "E501"      # line length handled by formatter if you enable it
]

# Per-file ignores example (tests can be a bit looser)
[tool.ruff.lint.per-file-ignores]
"tests/**.py" = ["S101"] # example: allow assert if you enable flake8-bandit later

# If you want Ruff to format too (replaces Black), keep this on:
[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true